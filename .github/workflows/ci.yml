name: CI — SGROUP ERP

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Hủy CI run cũ nếu có push mới trên cùng branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ══════════════════════════════════════════════════════════════
  # JOB 1: Backend (NestJS)
  # ══════════════════════════════════════════════════════════════
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sgroup-erp-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB: sgroup_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/sgroup_erp_test
      JWT_SECRET: ci-test-secret-key-must-be-at-least-32-chars-long
      JWT_EXPIRES_IN: 1h
      NODE_ENV: test
      DB_ADAPTER: prisma

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: sgroup-erp-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Run unit tests
        run: npm run test -- --passWithNoTests --coverage --coverageReporters=text-summary

      - name: Build
        run: npm run build

  # ══════════════════════════════════════════════════════════════
  # JOB 2: Frontend (Expo/React Native Web)
  # ══════════════════════════════════════════════════════════════
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SGROUP-ERP-UNIVERSAL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: SGROUP-ERP-UNIVERSAL/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build web (Expo export)
        run: npx expo export --platform web
        env:
          EXPO_PUBLIC_API_URL: https://sgroup-erp.onrender.com/api

  # ══════════════════════════════════════════════════════════════
  # JOB 3: Security Audit
  # ══════════════════════════════════════════════════════════════
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit backend dependencies
        working-directory: sgroup-erp-backend
        run: npm audit --audit-level=high
        continue-on-error: true  # Không block CI nhưng vẫn hiển thị

      - name: Audit frontend dependencies
        working-directory: SGROUP-ERP-UNIVERSAL
        run: npm audit --audit-level=high
        continue-on-error: true
