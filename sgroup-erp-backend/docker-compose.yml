version: "3.8"

services:
  sgroup_erp_db:
    image: postgres:16-alpine
    container_name: sgroup_erp_db
    restart: always
    environment:
      POSTGRES_USER: sgroup_admin
      POSTGRES_PASSWORD: sgroup_password!
      POSTGRES_DB: sgroup_erp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_sgroup:/var/lib/postgresql/data

volumes:
  postgres_data_sgroup:
